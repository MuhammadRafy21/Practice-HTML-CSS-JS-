<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<<div class="container">
    <h2>Subject Management</h2>
    
    <div class="initial-inputs">
        <button type="button" onclick="location.href='index.html'">Back to home Page</button>
    </div>

    <div class="initial-inputs">
        <button type="button" onclick="location.href='student.html'">Go to Student Page</button>
    </div>

    <div class="form-container" id="formcontainer">
        <input type="number" id="subjectId" placeholder="Subject ID">
        <input type="text" id="subjectName" placeholder="Subject Name">
        <button id="addSubjectBtn">Add Subject</button>
    </div>

    <table id="subjectsTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Subject Name</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script src="subject.js"></script>
</body>
</html>
